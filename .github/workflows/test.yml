name: Test Extension

on:
  push:
    branches: [ main, master, vibe/** ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Validate Metadata and Schema
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3

      - name: Compile GSettings schemas
        run: |
          glib-compile-schemas schemas/ 2>/dev/null || echo "Schema compilation skipped"

      - name: Validate metadata.json
        run: python3 .github/scripts/validate_metadata.py

  lint:
    name: Lint JavaScript files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        run: |
          for file in extension.js prefs.js; do
            if [ -f "$file" ]; then
              node --check "$file" || { echo "::error file=$file::Syntax error in $file"; exit 1; }
            fi
          done
          grep -q "Clutter.EVENT_STOP" extension.js || echo "::warning::Missing EVENT_STOP pattern"
          grep -q "queue_repaint" extension.js || echo "::warning::Missing queue_repaint pattern"
          grep -q "getSettings" extension.js || echo "::warning::Missing getSettings pattern"

  test-schema:
    name: Validate GSettings Schema
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XML lint
        run: sudo apt-get install -y libxml2-utils

      - name: Validate schema XML
        run: xmllint --noout schemas/org.gnome.shell.extensions.find-my-mouse.gschema.xml

  check-commits:
    name: Check Commit Messages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          git log --oneline HEAD~5..HEAD | while read -r line; do
            # Extract just the commit message (after the hash)
            message=$(echo "$line" | sed 's/^[a-f0-9]\{7\} //')
            if ! echo "$message" | grep -qE '^(feat|fix|docs|style|refactor|test|chore)(\(|:|$)'; then
              echo "::warning::Commit message does not follow conventional commits: $line"
            fi
          done
